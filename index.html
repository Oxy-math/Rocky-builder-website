<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rocky Builder</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@900&family=Fredoka:wght@600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        /* ===== STYLES DE BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #FF6B35;
            --secondary: #F7931E;
            --accent: #FDC500;
            --light: #FFF8F0;
            --shadow: rgba(255, 107, 53, 0.2);
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: url('https://cdn.jsdelivr.net/gh/Oxy-math/Rocky-builder-website@main/images/Background_site.png') center center / cover fixed, linear-gradient(135deg, #FFF8F0 0%, #FFE5D9 100%);
            min-height: 100vh;
            padding: 20px;
            color: #2D3142;
        }

        /* ===== LEFT SIDEBAR ===== */
        .left-sidebar {
            position: fixed;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            z-index: 100;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            border-radius: 50px;
            padding: 14px 10px;
            box-shadow: 0 4px 20px rgba(255, 107, 53, 0.15);
            border: 1px solid rgba(255, 107, 53, 0.15);
        }

        .left-sidebar a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--light);
            color: var(--primary);
            text-decoration: none;
            transition: all 0.2s ease;
            font-size: 1.1rem;
        }

        .left-sidebar a:hover {
            background: var(--primary);
            color: white;
            transform: scale(1.15);
            box-shadow: 0 4px 12px var(--shadow);
        }

        .left-sidebar a svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        .left-sidebar-divider {
            width: 24px;
            height: 1px;
            background: rgba(255, 107, 53, 0.2);
            border-radius: 1px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            animation: slideDown 0.6s ease-out;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-family: 'Nunito', sans-serif;
            font-size: 4.2rem;
            font-weight: 900;
            color: #1a1a1a;
            text-shadow: 3px 3px 0 rgba(253, 197, 0, 0.6), 5px 5px 0 rgba(247, 147, 30, 0.3);
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        .tagline {
            font-size: 1.3rem;
            color: #2D3142;
            opacity: 0.8;
            font-weight: 700;
        }

        .workspace {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 30px;
            animation: fadeIn 0.8s ease-out 0.2s both;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .canvas-container {
            background: white;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 20px 60px var(--shadow);
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: relative;
        }

        .canvas-container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 107, 53, 0.03) 0%, transparent 70%);
            pointer-events: none;
        }

        .canvas-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            background: 
                linear-gradient(45deg, #ccc 25%, transparent 25%),
                linear-gradient(-45deg, #ccc 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #ccc 75%),
                linear-gradient(-45deg, transparent 75%, #ccc 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            background-color: #f5f5f5;
        }

        #canvas {
            border-radius: 16px;
            display: block;
        }

        .controls {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            font-family: 'Fredoka', sans-serif;
            font-size: 1rem;
            padding: 14px 28px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }

        .btn-primary:hover {
            box-shadow: 0 6px 25px var(--shadow);
            transform: translateY(-2px);
        }

        .btn-danger {
            background: #E63946;
            color: white;
        }

        .btn-danger:hover {
            background: #D62828;
            box-shadow: 0 6px 25px rgba(230, 57, 70, 0.3);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #FDC500, #F7931E);
            color: white;
        }

        .btn-secondary:hover {
            background: linear-gradient(135deg, #F7931E, #FF6B35);
            box-shadow: 0 6px 25px rgba(247, 147, 30, 0.35);
            transform: translateY(-2px);
        }

        .btn-share {
            background: #000000;
            color: white;
        }

        .btn-share:hover {
            background: #1a1a1a;
            box-shadow: 0 6px 25px rgba(0, 0, 0, 0.3);
            transform: translateY(-2px);
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .panel {
            background: white;
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            animation: slideLeft 0.8s ease-out 0.4s both;
        }

        @keyframes slideLeft {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .panel-title {
            font-family: 'Fredoka', sans-serif;
            font-size: 1.4rem;
            color: var(--primary);
            margin-bottom: 16px;
            font-weight: 700;
        }

        .category-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .category-tab {
            padding: 8px 16px;
            border-radius: 20px;
            border: 2px solid var(--light);
            background: white;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.3s ease;
            color: #2D3142;
        }

        .category-tab:hover {
            border-color: var(--secondary);
            background: var(--light);
        }

        .category-tab.active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border-color: transparent;
        }

        /* ===== GRILLE ===== */
        .asset-grid {
            display: grid;
            grid-template-columns: repeat(3, 85px);
            gap: 10px;
            max-height: 500px;
            overflow-y: auto;
            overflow-x: hidden;
            padding-right: 6px;
        }

        .asset-grid[data-category="flags"] {
            grid-template-columns: repeat(3, 85px);
            gap: 10px;
        }

        .asset-grid::-webkit-scrollbar {
            width: 8px;
        }

        .asset-grid::-webkit-scrollbar-track {
            background: var(--light);
            border-radius: 10px;
        }

        .asset-grid::-webkit-scrollbar-thumb {
            background: var(--secondary);
            border-radius: 10px;
        }

        .asset-item {
            width: 85px;
            height: 85px;
            background: white;
            border-radius: 12px;
            cursor: pointer;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            border: 2px solid #ddd;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            position: relative;
            display: block;
            flex-shrink: 0;
        }

        .asset-item img {
            position: absolute;
            top: 0;
            left: 0;
            width: 85px;
            height: 85px;
            object-fit: contain;
            pointer-events: none;
            display: block;
        }

        .asset-item::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 1;
            pointer-events: none;
        }

        .asset-item:hover {
            border-color: var(--primary);
            box-shadow: 0 4px 16px var(--shadow);
            outline: 2px solid var(--primary);
        }

        .asset-item:hover::before {
            opacity: 0.08;
        }

        .asset-name {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(45, 49, 66, 0.9);
            color: white;
            font-size: 0.6rem;
            padding: 4px;
            text-align: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 2;
            font-weight: 500;
            pointer-events: none;
        }

        .asset-item:hover .asset-name {
            opacity: 1;
        }

        .instructions {
            background: linear-gradient(135deg, #FFF8F0, #FFE5D9);
            border-left: 4px solid var(--primary);
            padding: 16px;
            border-radius: 12px;
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .instructions strong {
            color: var(--primary);
            font-weight: 700;
        }

        .info-badge {
            display: inline-block;
            background: var(--accent);
            color: #2D3142;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-bottom: 12px;
        }

        @media (max-width: 1024px) {
            .workspace {
                grid-template-columns: 1fr;
            }
            h1 {
                font-size: 2.5rem;
            }
            .asset-grid {
                grid-template-columns: repeat(4, 85px);
                max-height: 300px;
            }
        }

        @media (max-width: 640px) {
            h1 {
                font-size: 2rem;
                text-shadow: 2px 2px 0 var(--accent), 4px 4px 0 var(--secondary);
            }
            .canvas-wrapper canvas {
                max-width: 100%;
                height: auto !important;
            }
            .asset-grid {
                grid-template-columns: repeat(3, 85px);
            }
        }
        /* ===== NICKNAME ===== */
        .nickname-section {
            margin-top: 18px;
            padding-top: 16px;
            border-top: 2px solid var(--light);
        }

        .nickname-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 8px;
        }

        .nickname-row {
            display: flex;
            gap: 8px;
        }

        .nickname-input {
            flex: 1;
            padding: 10px 14px;
            border: 2px solid #ddd;
            border-radius: 50px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s ease;
            color: #2D3142;
        }

        .nickname-input:focus {
            border-color: var(--primary);
        }

        .nickname-btn {
            padding: 10px 18px;
            font-size: 0.9rem;
            white-space: nowrap;
        }

        /* ===== OVERLAY IMAGE (background site rocky.png) ===== */
        .site-overlay {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            display: block;
            transform-origin: top left;
        }
    </style>
</head>

    <div class="container">

                <div class="canvas-wrapper">
                    <canvas id="canvas"></canvas>
                </div>

                    <button class="btn btn-secondary" id="sendBackwardBtn">

                if (!img || !img.width) {
                    console.error('❌ Default Rocky not found:', label);
                    return;
                }

                const scale = Math.min(
                    (CANVAS_SIZE * 0.85) / img.width,
                    (CANVAS_SIZE * 0.85) / img.height
                );
                img.scale(scale);

                img.set({
                    left: CANVAS_SIZE / 2,
                    top: CANVAS_SIZE,
                    originX: 'center',
                    originY: 'bottom',
                    selectable: false,
                    evented: false,
                    hasControls: false,
                    hasBorders: false,
                    lockMovementX: true,
                    lockMovementY: true
                });

                baseImage = img;
                canvas.add(img);
                canvas.renderAll();
            }, 
            () => {
                console.error('❌ Failed to load Rocky image:', label);
            }, { crossOrigin: 'anonymous' });
        }

        // --------------------------------------------------------------
        // INTERFACE
        // --------------------------------------------------------------
        function loadCategoryTabs() {
            const tabsContainer = document.getElementById('categoryTabs');
            tabsContainer.innerHTML = '';
            
            const categories = [
                { id: 'backgrounds', label: '🎨 Backgrounds' },
                { id: 'hair', label: '💇 Hair' },
                { id: 'eyes', label: '👁️ Eyes' },
                { id: 'mouth', label: '👄 Mouth' },
                { id: 'accessories', label: '🎩 Accessories' },
                { id: 'flags', label: '🚩 Flags' },
                { id: 'magnitude', label: '🏅 Badges' },
                { id: 'bodyparts', label: '💪 Body Parts' }
            ];
            
            categories.forEach(cat => {
                const tab = document.createElement('div');
                tab.className = 'category-tab' + (cat.id === currentCategory ? ' active' : '');
                tab.textContent = cat.label;
                tab.onclick = () => switchCategory(cat.id);
                tabsContainer.appendChild(tab);
            });
        }

        function switchCategory(categoryId) {
            currentCategory = categoryId;
            loadCategoryTabs();
            loadAssetGrid();
        }

        function loadAssetGrid() {
            const grid = document.getElementById('assetGrid');
            grid.innerHTML = '';
            
            grid.setAttribute('data-category', currentCategory);
            
            const assets = ASSETS[currentCategory] || [];
            
            assets.forEach((asset, index) => {
                const item = document.createElement('div');
                item.className = 'asset-item';
                item.dataset.assetIndex = index;
                
                const img = document.createElement('img');
                const src = currentCategory === 'backgrounds'
                    ? asset.imageUrl
                    : (asset.imageUrl.includes(' ') ? encodeURI(asset.imageUrl) : asset.imageUrl);
                img.src = src;
                img.alt = asset.name;
                img.style.objectFit = currentCategory === 'backgrounds' ? 'cover' : 'contain';
                img.onerror = function() {
                    this.src = currentCategory === 'backgrounds'
                        ? 'https://placehold.co/200x200/CCCCCC/2D3142?text=BG'
                        : 'https://placehold.co/200x200/CCCCCC/2D3142?text=Missing';
                };
                item.appendChild(img);
                
                const name = document.createElement('div');
                name.className = 'asset-name';
                name.textContent = asset.name.toUpperCase();
                item.appendChild(name);
                
                grid.appendChild(item);
            });
        }

        // --------------------------------------------------------------
        // CLICK DELEGATION
        // --------------------------------------------------------------
        document.getElementById('assetGrid').addEventListener('click', (e) => {
            const assetItem = e.target.closest('.asset-item');
            if (!assetItem) return;
            
            const index = assetItem.dataset.assetIndex;
            if (index === undefined) return;
            
            const assets = ASSETS[currentCategory];
            if (!assets) return;
            
            const asset = assets[parseInt(index)];
            if (!asset) return;
            
            if (currentCategory === 'backgrounds') {
                addBackgroundToCanvas(asset);
            } else {
                addAssetToCanvas(asset);
            }
        });

        // --------------------------------------------------------------
        // ADD OBJECTS
        // --------------------------------------------------------------
        function addBackgroundToCanvas(bgAsset) {
            const objects = canvas.getObjects();
            objects.forEach(obj => {
                if (obj.isBackground) canvas.remove(obj);
            });
            
            const url = bgAsset.imageUrl.includes(' ') ? encodeURI(bgAsset.imageUrl) : bgAsset.imageUrl;
            
            fabric.Image.fromURL(url, (img) => {
                if (!img || !img.width) {
                    console.error('❌ Failed to load background:', bgAsset.name);
                    return;
                }
                
                img.scaleToWidth(CANVAS_SIZE);
                img.scaleToHeight(CANVAS_SIZE);
                
                img.set({
                    left: 0,
                    top: 0,
                    originX: 'left',
                    originY: 'top',
                    selectable: false,
                    evented: false,
                    isBackground: true,
                    scaleX: CANVAS_SIZE / img.width,
                    scaleY: CANVAS_SIZE / img.height
                });
                
                canvas.add(img);
                canvas.sendToBack(img);
                
                if (baseImage) {
                    canvas.moveTo(baseImage, 1);
                }
                
                canvas.renderAll();

                // Recalcule la couleur du nickname selon le nouveau background
                if (nicknameObj) {
                    canvas.bringToFront(nicknameObj);
                    setTimeout(updateNicknameColor, 50);
                }
            }, (err) => {
                console.error('❌ Error loading background:', bgAsset.imageUrl, err);
            }, { crossOrigin: 'anonymous' });
        }

        function addAssetToCanvas(asset) {
            const url = asset.imageUrl.includes(' ') ? encodeURI(asset.imageUrl) : asset.imageUrl;
            
            fabric.Image.fromURL(url, (img) => {
                if (!img || !img.width) {
                    console.error('❌ Failed to load asset:', asset.name);
                    return;
                }
                
                const scale = Math.min(150 / img.width, 150 / img.height);
                img.scale(scale);
                
                img.set({
                    left: CANVAS_SIZE / 2 + (Math.random() - 0.5) * 200,
                    top: CANVAS_SIZE / 2 + (Math.random() - 0.5) * 200,
                    originX: 'center',
                    originY: 'center',
                    borderColor: '#FF6B35',
                    cornerColor: '#FF6B35',
                    cornerStyle: 'circle',
                    transparentCorners: false,
                    cornerSize: 12,
                    borderScaleFactor: 2,
                    rotatingPointOffset: 30
                });
                
                canvas.add(img);
                canvas.setActiveObject(img);
                canvas.renderAll();
            }, 
            (err) => {
                console.error('❌ Error loading image:', asset.imageUrl, err);
                alert(`Failed to load image: ${asset.name}\nCheck that the file exists in the correct location.`);
            }, { crossOrigin: 'anonymous' });
        }

        // --------------------------------------------------------------
        // LAYER CONTROLS
        // --------------------------------------------------------------
        function bringForward() {
            const activeObject = canvas.getActiveObject();
            if (activeObject && activeObject !== baseImage && !activeObject.isBackground && !activeObject.isNickname) {
                canvas.bringForward(activeObject);
                canvas.renderAll();
            } else {
                alert('Please select an asset (not Rocky or background) to bring forward.');
            }
        }

        function sendBackward() {
            const activeObject = canvas.getActiveObject();
            if (activeObject && activeObject !== baseImage && !activeObject.isBackground && !activeObject.isNickname) {
                canvas.sendBackwards(activeObject);
                canvas.renderAll();
            } else {
                alert('Please select an asset (not Rocky or background) to send backward.');
            }
        }

        // --------------------------------------------------------------
        // EVENTS
        // --------------------------------------------------------------
        // --------------------------------------------------------------
        // HELPER — export canvas en PNG via le canvas DOM natif
        // Contourne le bug "tainted canvas" de Fabric.js avec images cross-origin
        // --------------------------------------------------------------
        function getCanvasDataURL() {
            canvas.discardActiveObject();
            canvas.renderAll();

            // Récupère le vrai HTMLCanvasElement sous Fabric
            const fabricEl = canvas.getElement();

            // Recopie dans un canvas temporaire de même taille
            const tmp = document.createElement('canvas');
            tmp.width  = fabricEl.width;
            tmp.height = fabricEl.height;
            const ctx = tmp.getContext('2d');
            ctx.drawImage(fabricEl, 0, 0);

            return tmp.toDataURL('image/png');
        }

        // --------------------------------------------------------------
        // EVENTS
        // --------------------------------------------------------------
        document.getElementById('downloadBtn').addEventListener('click', () => {
            try {
                const dataURL = getCanvasDataURL();
                const link = document.createElement('a');
                link.download = `rocky-${Date.now()}.png`;
                link.href = dataURL;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            } catch (e) {
                console.error('Export failed:', e);
            }
        });

        document.getElementById('shareBtn').addEventListener('click', () => {
            // Tente de télécharger l'image (peut échouer en file:// à cause des CORS)
            try {
                const dataURL = getCanvasDataURL();
                const link = document.createElement('a');
                link.download = `rocky-${Date.now()}.png`;
                link.href = dataURL;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            } catch (e) {
                console.warn('Image export failed (likely CORS on file://):', e);
            }

            // Ouvre X dans tous les cas
            setTimeout(() => {
                const text = encodeURIComponent('Check out my Rocky! 🗿 #SeismicRocky #Seismic');
                window.open(`https://x.com/intent/tweet?text=${text}&url=https://x.com/Math_FTN74/status/2003229670272025066`, '_blank');
            }, 400);
        });

        document.getElementById('clearBtn').addEventListener('click', () => {
            if (confirm('Clear all items? This action is irreversible.')) {
                const objects = canvas.getObjects();
                objects.forEach(obj => {
                    if (obj !== baseImage) canvas.remove(obj);
                });
                nicknameObj = null;
                canvas.renderAll();
            }
        });

        document.getElementById('bringForwardBtn').addEventListener('click', bringForward);
        document.getElementById('sendBackwardBtn').addEventListener('click', sendBackward);

        document.addEventListener('keydown', (e) => {
            if ((e.key === 'Delete' || e.key === 'Backspace') && document.activeElement.tagName !== 'INPUT') {
                const activeObject = canvas.getActiveObject();
                if (activeObject && activeObject !== baseImage && !activeObject.isBackground && !activeObject.isNickname) {
                    canvas.remove(activeObject);
                    canvas.renderAll();
                    e.preventDefault();
                }
            }
        });

        // --------------------------------------------------------------
        // NICKNAME SYSTEM
        // --------------------------------------------------------------

        // Calcule la luminance moyenne d'un background Fabric (image)
        // en rendant le canvas dans un canvas 2D off-screen et en échantillonnant
        function getBackgroundLuminance() {
            return new Promise((resolve) => {
                const bgObj = canvas.getObjects().find(o => o.isBackground);
                if (!bgObj) { resolve(1); return; } // pas de bg = fond blanc

                // Render le canvas Fabric dans un canvas temporaire 64x64
                const size = 64;
                const offscreen = document.createElement('canvas');
                offscreen.width  = size;
                offscreen.height = size;
                const ctx = offscreen.getContext('2d');

                // On dessine uniquement le background à l'échelle réduite
                const fabricCanvas = canvas.getElement();
                ctx.drawImage(fabricCanvas, 0, 0, CANVAS_SIZE, CANVAS_SIZE, 0, 0, size, size);

                const data = ctx.getImageData(0, 0, size, size).data;
                let total = 0;
                const pixels = size * size;
                for (let i = 0; i < data.length; i += 4) {
                    const r = data[i], g = data[i+1], b = data[i+2];
                    // Luminance relative (formule perceptuelle)
                    total += (0.2126 * r + 0.7152 * g + 0.0722 * b) / 255;
                }
                resolve(total / pixels);
            });
        }

        async function updateNicknameColor() {
            if (!nicknameObj) return;
            const lum = await getBackgroundLuminance();
            // Blanc/gris clair (luminance très haute et peu saturé) → noir, sinon → blanc
            const isNeutralLight = lum > 0.80;
            const textColor   = isNeutralLight ? '#111111' : '#FFFFFF';
            const strokeColor = isNeutralLight ? 'rgba(0,0,0,0.15)' : 'rgba(0,0,0,0.55)';
            nicknameObj.set({
                fill:        textColor,
                stroke:      strokeColor,
                strokeWidth: 6,
                paintFirst:  'stroke',
                shadow: new fabric.Shadow({
                    color:   isNeutralLight ? 'rgba(0,0,0,0.25)' : 'rgba(0,0,0,0.5)',
                    blur:    8,
                    offsetX: 2,
                    offsetY: 2
                })
            });
            canvas.renderAll();
        }

        function applyNickname() {
            const text = document.getElementById('nicknameInput').value.trim();
            if (!text) return;

            if (nicknameObj) {
                canvas.remove(nicknameObj);
                nicknameObj = null;
            }

            const MARGIN = 32;
            nicknameObj = new fabric.Text(text, {
                left:        CANVAS_SIZE - MARGIN,
                top:         CANVAS_SIZE - MARGIN,
                originX:     'right',
                originY:     'bottom',
                fontSize:    52,
                fontFamily:  'Nunito',
                fontWeight:  '900',
                fill:        '#FFFFFF',
                stroke:      'rgba(0,0,0,0.55)',
                strokeWidth: 6,
                paintFirst:  'stroke',
                shadow: new fabric.Shadow({ color: 'rgba(0,0,0,0.5)', blur: 8, offsetX: 2, offsetY: 2 }),
                selectable:    false,
                evented:       false,
                hasControls:   false,
                hasBorders:    false,
                lockMovementX: true,
                lockMovementY: true,
                isNickname:    true
            });

            canvas.add(nicknameObj);
            canvas.bringToFront(nicknameObj);
            canvas.renderAll();
            updateNicknameColor();
        }

        document.getElementById('applyNicknameBtn').addEventListener('click', applyNickname);
        document.getElementById('nicknameInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') applyNickname();
        });

        // Recalculer la couleur du nickname à chaque ajout de background
        const _origAddBg = addBackgroundToCanvas;
        // Override via wrapping (on patchera après le chargement du bg)

        // --------------------------------------------------------------
        // INIT
        // --------------------------------------------------------------
        loadCategoryTabs();
        loadAssetGrid();
        loadRockyFromURL(DEFAULT_ROCKY_URL, 'rocky_base.png');

        // --------------------------------------------------------------
        // OVERLAY POSITIONING — ancré sur le coin haut-gauche du canvas-wrapper
        // --------------------------------------------------------------
        const overlayImg = document.getElementById('siteOverlay');
        const canvasWrapperEl = document.querySelector('.canvas-wrapper');

        // OVERLAY_SCALE : largeur de l'overlay = N * largeur du canvas-wrapper rendu
        const OVERLAY_SCALE = 0.35;   // ajuste pour changer la taille du perso
        const OFFSET_X_PX = -173;      // décalage en pixels vers la gauche depuis le coin du cadre
        const OFFSET_Y_PX = -167;      // décalage en pixels vers le haut depuis le coin du cadre

        function positionOverlay() {
            const rect = canvasWrapperEl.getBoundingClientRect();
            const w = rect.width * OVERLAY_SCALE;
            const x = rect.left + OFFSET_X_PX;
            const y = rect.top  + OFFSET_Y_PX;

            overlayImg.style.width  = w + 'px';
            overlayImg.style.height = 'auto';
            overlayImg.style.left   = x + 'px';
            overlayImg.style.top    = y + 'px';
        }

        // Attendre que l'image overlay soit chargée pour éviter un flash
        overlayImg.onload = positionOverlay;
        if (overlayImg.complete) positionOverlay();

        window.addEventListener('resize', positionOverlay);
        // Sur scroll, le canvas bouge dans le viewport donc on recalcule
        window.addEventListener('scroll', positionOverlay, { passive: true });
        // Recalcul après les animations de layout (ex: chargement de Rocky)
        setTimeout(positionOverlay, 500);
        setTimeout(positionOverlay, 1200);
    </script>
</body>
